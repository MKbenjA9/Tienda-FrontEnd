name: CI/CD Tienda Perritos - Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
      - ".github/workflows/**"

jobs:
  build-push-deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build imagen Frontend
        run: |
          cd frontend
          docker build -t tienda-frontend .

      - name: Tag imagen Frontend
        run: |
          docker tag tienda-frontend:latest ${{ secrets.ECR_REPO_URL_FRONT }}:latest

      - name: Push imagen Frontend a ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL_FRONT }}:latest

      - name: Desplegar Frontend vía SSM
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_FRONT_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Actualizar tienda-frontend desde ECR" \
            --parameters '{"commands":[
              "set -e",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 346014945832.dkr.ecr.us-east-1.amazonaws.com",
              "docker pull 346014945832.dkr.ecr.us-east-1.amazonaws.com/tienda-frontend:latest",
              "docker stop tienda-frontend || true",
              "docker rm tienda-frontend || true",
              "docker run -d --name tienda-frontend -p 80:80 346014945832.dkr.ecr.us-east-1.amazonaws.com/tienda-frontend:latest"
            ]}' \
            --region ${{ secrets.AWS_REGION }} \
            --output text